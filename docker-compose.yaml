version: "3.8"

services:
  wechat-bot:
    build: .
    container_name: wechat-bot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
    environment:
      - LOG_LEVEL=INFO
      - WEBHOOK_TOKEN=${WEBHOOK_TOKEN:-change-me-to-a-secure-token}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
